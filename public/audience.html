<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kontroler Audiens — Kelompok 6</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="audience.css">
</head>
<body>

  <div id="joinScreen" class="screen">
    <div class="join-card">
      <div class="join-eyebrow"><span class="signal-dot"></span> Kontroler Presentasi</div>
      <h1 id="joinTitle">Gabung ke Sesi</h1>
      <p class="join-sub" id="joinKelompok"></p>
      <input id="nameInput" type="text" placeholder="Nama kamu" maxlength="40" autocomplete="off">
      <button id="joinBtn" class="btn-primary">Gabung</button>
    </div>
  </div>

  <div id="mainScreen" class="screen" hidden>
    <header class="app-header">
      <span class="signal-dot"></span>
      <span id="slideInfo">Slide 1/1</span>
    </header>

    <section class="card hand-card">
      <button id="handBtn" class="hand-btn">
        <span class="hand-icon">✋</span>
        <span id="handLabel">Angkat Tangan</span>
      </button>
    </section>

    <section class="card">
      <div class="card-title">Reaksi Cepat</div>
      <div class="reactions-row">
        <button class="reaction-btn" data-emoji="👍">👍</button>
        <button class="reaction-btn" data-emoji="😂">😂</button>
        <button class="reaction-btn" data-emoji="❓">❓</button>
        <button class="reaction-btn" data-emoji="❤️">❤️</button>
      </div>
    </section>

    <section class="card poll-card" id="pollCard" hidden>
      <div class="card-title">📊 Polling Berlangsung</div>
      <div class="poll-q" id="pollQ"></div>
      <div class="poll-options" id="pollOptions"></div>
      <div class="poll-voted" id="pollVoted" hidden>Suara kamu sudah tercatat ✓</div>
    </section>

    <section class="card">
      <div class="card-title">
        Tanya Presenter
        <span class="q-counter" id="qCounter">0/3</span>
      </div>
      <textarea id="questionInput" placeholder="Tulis pertanyaanmu..." maxlength="300" rows="2"></textarea>
      <button id="askBtn" class="btn-secondary">Kirim Pertanyaan</button>
      <div class="q-hint" id="qHint"></div>
    </section>
  </div>

  <div id="endScreen" class="screen" hidden>
    <div class="join-card">
      <h1>Terima kasih! 🙌</h1>
      <p class="join-sub">Presentasi sudah selesai. Kasih rating &amp; masukan singkat, yuk.</p>
      <div class="stars-input" id="starsInput">
        <span data-star="1">★</span><span data-star="2">★</span><span data-star="3">★</span><span data-star="4">★</span><span data-star="5">★</span>
      </div>
      <textarea id="feedbackInput" placeholder="Masukan singkat (opsional)" rows="3"></textarea>
      <button id="submitRatingBtn" class="btn-primary">Kirim Feedback</button>
      <div id="ratingThanks" class="rating-thanks" hidden>Terkirim, makasih! 🎉</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="audience.js"></script>
</body>
</html>
